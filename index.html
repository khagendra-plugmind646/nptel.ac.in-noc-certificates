<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Certificate</title>
    <meta name="description" content="A simple responsive certificate display page.">
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(12px, 3vw, 32px);
        background: #f4f7f6;
        color: #18201d;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(100%, 1120px);
      }

      img {
        display: block;
        width: 100%;
        max-height: calc(100vh - clamp(24px, 6vw, 64px));
        object-fit: contain;
        background: #ffffff;
        border: 1px solid #d7dfdc;
        box-shadow: 0 18px 45px rgba(25, 40, 34, 0.16);
      }

      @media (max-width: 640px) {
        body {
          padding: 10px;
        }

        img {
          max-height: calc(100vh - 20px);
          box-shadow: 0 10px 26px rgba(25, 40, 34, 0.14);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="sample-certificate.svg" alt="Certificate">
    </main>
  </body>
</html>
